name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install .[dev]

      - name: Ruff lint
        continue-on-error: true
        run: ruff check data_collection/ tests/

      - name: Mypy type check
        continue-on-error: true
        run: mypy data_collection/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v

      - name: Build check
        run: pip install build && python -m build --wheel --no-isolation
